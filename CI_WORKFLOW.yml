# GitHub Actions CI for Verum Omnis
# COPY THIS FILE TO: .github/workflows/ci.yml

name: Verum Omnis CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - run: chmod +x gradlew
      - run: ./gradlew ktlintCheck
      - run: ./gradlew detekt
      - run: ./gradlew testDebugUnitTest
      - run: ./gradlew jacocoTestReport
      - run: ./gradlew assembleDebug
      - run: ./gradlew assembleRelease

  verify:
    name: Verify No TODOs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          if grep -r "TODO()\|// TODO:\|FIXME\|NotImplementedException" --include="*.kt" app/src/ 2>/dev/null; then
            echo "ERROR: Found TODOs or placeholders" && exit 1
          fi
          echo "Clean - no TODOs found"

  constitutional:
    name: Constitutional Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - run: chmod +x gradlew
      - run: ./gradlew testDebugUnitTest --tests "*ConstitutionTest*"
      - run: ./gradlew testDebugUnitTest --tests "*DeterminismTest*"
      - run: ./gradlew testDebugUnitTest --tests "*NineBrainVotingTest*"
